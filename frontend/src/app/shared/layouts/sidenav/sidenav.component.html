<aside class="w-64 bg-surface border-r border-surfaceBorder flex flex-col h-full">
  <div class="p-6">
    <div class="bg-darker border border-surfaceBorder rounded-lg p-5 text-center flex flex-col items-center justify-center group hover:border-cuda/30 transition-all">
      <span class="text-cuda font-black text-lg uppercase tracking-tight leading-none">
        CUDA Platform
      </span>
      <span class="text-white font-light text-[14px] uppercase tracking-[0.5em] mt-2 opacity-60 leading-none ml-[0.5em]">
        TFG
      </span>
    </div>
  </div>

  <nav class="flex-1 px-4 space-y-2">
    
    <div class="py-4">
      <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-4 px-2">Espacio de Trabajo</p>
      <a routerLink="/workspace" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
        <span class="text-sm font-medium">Terminal CUDA</span>
      </a>
    </div>

    <div class="py-4 border-t border-surfaceBorder/50">
      <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-4 px-2">Mi Cuenta</p>
      
      <a routerLink="/profile" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        <span class="text-sm font-medium">Perfil y Ajustes</span>
      </a>

      <a routerLink="/metrics" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
        <span class="text-sm font-medium">Mis Métricas</span>
      </a>
    </div>

    <div *ngIf="authService.currentUser()?.role === 'admin'" class="py-4 border-t border-surfaceBorder/50">
      <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-4 px-2">Administración</p>
      
      <a routerLink="/admin/dashboard" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
        <span class="text-sm font-medium">Métricas Globales</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <span class="text-sm font-medium">Gestión de Estudiantes</span>
      </a>

      <a routerLink="/admin/resources" routerLinkActive="bg-cuda/10 text-cuda border-cuda" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-white/5 rounded-r-lg transition-all border-l-4 border-transparent">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" /></svg>
        <span class="text-sm font-medium">Recursos Globales</span>
      </a>
    </div>
  </nav>

  <div class="p-6 border-t border-surfaceBorder/50 text-center text-[17px] text-slate-600">
  <p>2026 TFG</p>
  <p class="font-medium">Raúl Vázquez Rodríguez</p>
</div>
</aside>
